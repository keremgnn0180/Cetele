<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Çetele Recovery Mode</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Segoe UI, sans-serif;
        background: #f3f7f1;
        color: #14211a;
      }
      .panel {
        width: min(520px, calc(100vw - 40px));
        background: #fff;
        border: 1px solid #dfe8df;
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 18px 60px rgba(16, 24, 40, 0.12);
      }
      h1 { margin: 0 0 12px; font-size: 24px; }
      p { margin: 0 0 20px; color: #5d6b63; line-height: 1.5; }
      button {
        border: 0;
        border-radius: 10px;
        padding: 12px 16px;
        background: #1f7a4d;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Çetele güvenli modda</h1>
      <p>Arayüz süreci beklenmeyen şekilde kapandı. Verileriniz korunur; uygulamayı yeniden yükleyerek tekrar deneyebilirsiniz.</p>
      <button onclick="location.reload()">Yeniden Dene</button>
    </main>
  </body>
</html>
